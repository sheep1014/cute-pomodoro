<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <main class="page">
    <section class="app-card">
      <header class="header">
        <div>
          <p class="overline">Pomodoro</p>
          <h1>专注计时</h1>
        </div>
        <div class="badge">
          <span class="badge-dot"></span>
          <span id="moodText">Ready</span>
        </div>
      </header>

      <section class="segmented-control" aria-label="模式切换">
        <button class="mode active" data-mode="focus">专注</button>
        <button class="mode" data-mode="shortBreak">短休息</button>
        <button class="mode" data-mode="longBreak">长休息</button>
      </section>

      <section class="hero">
        <div class="ring-shell">
          <svg viewBox="0 0 260 260" class="progress-svg" aria-hidden="true">
            <circle cx="130" cy="130" r="112" class="ring-bg"></circle>
            <circle cx="130" cy="130" r="112" class="ring-progress"></circle>
          </svg>
          <div class="ring-center">
            <div id="time" class="time">25:00</div>
            <div id="status" class="status">准备开始</div>
          </div>
        </div>
      </section>

      <section class="controls">
        <button id="startPause" class="button primary">开始</button>
        <button id="reset" class="button secondary">重置</button>
      </section>

      <section class="footer-grid">
        <div class="panel">
          <div class="panel-head">
            <h2>时长设置</h2>
            <span>min</span>
          </div>
          <div class="inputs">
            <label>
              <span>专注</span>
              <input id="focusInput" type="number" min="1" max="90" value="25" />
            </label>
            <label>
              <span>短休息</span>
              <input id="shortBreakInput" type="number" min="1" max="60" value="5" />
            </label>
            <label>
              <span>长休息</span>
              <input id="longBreakInput" type="number" min="1" max="90" value="15" />
            </label>
          </div>
        </div>

        <div class="panel stats-panel">
          <div class="panel-head">
            <h2>状态</h2>
            <span>Today</span>
          </div>
          <div class="stat-item">
            <span>完成专注</span>
            <strong id="completedCount">0</strong>
          </div>
          <div class="stat-item">
            <span>当前状态</span>
            <strong id="statusText">静置中</strong>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

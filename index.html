<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow glow-one"></div>
  <div class="background-glow glow-two"></div>

  <main class="shell">
    <section class="panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Focus Timer</p>
          <h1>番茄时钟</h1>
        </div>
        <div class="session-pill">
          <span class="session-dot"></span>
          <span id="moodText">Ready</span>
        </div>
      </header>

      <section class="mode-switch" aria-label="模式切换">
        <button class="mode active" data-mode="focus">专注</button>
        <button class="mode" data-mode="shortBreak">短休息</button>
        <button class="mode" data-mode="longBreak">长休息</button>
      </section>

      <section class="timer-section">
        <div class="timer-card">
          <svg viewBox="0 0 240 240" class="progress-svg" aria-hidden="true">
            <circle cx="120" cy="120" r="102" class="ring-bg"></circle>
            <circle cx="120" cy="120" r="102" class="ring-progress"></circle>
          </svg>
          <div class="timer-content">
            <div id="time" class="time">25:00</div>
            <p id="status" class="status">准备开始</p>
          </div>
        </div>
      </section>

      <section class="controls">
        <button id="startPause" class="primary">开始</button>
        <button id="reset" class="secondary">重置</button>
      </section>

      <section class="bottom-grid">
        <div class="info-card settings-card">
          <div class="section-head">
            <h2>时长</h2>
            <span>分钟</span>
          </div>
          <div class="settings-grid">
            <label>
              <span>专注</span>
              <input id="focusInput" type="number" min="1" max="90" value="25" />
            </label>
            <label>
              <span>短休息</span>
              <input id="shortBreakInput" type="number" min="1" max="60" value="5" />
            </label>
            <label>
              <span>长休息</span>
              <input id="longBreakInput" type="number" min="1" max="90" value="15" />
            </label>
          </div>
        </div>

        <div class="info-card stats-card">
          <div class="section-head">
            <h2>今日进度</h2>
            <span>Local</span>
          </div>
          <div class="stats-list">
            <div class="stat-row">
              <span>完成专注</span>
              <strong id="completedCount">0</strong>
            </div>
            <div class="stat-row">
              <span>当前状态</span>
              <strong id="statusText">静置中</strong>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
